<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no, email=no, address=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>POLO小球 - H5</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #10183a;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      position: fixed;
      inset: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      image-rendering: auto;
    }

    noscript {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      color: #fff;
      background: #10183a;
      font-size: 18px;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <noscript>需要开启 JavaScript 才能运行 POLO小球 H5 版。</noscript>
  <script src="https://cdn.233xyx.com/h5ad/metah5ad_v1.min.js"></script>
  <script src="https://wstatic-01-ali.233leyuan.com/common/h5API/mta-h5-api.js" type="module"></script>
  <script src="./game.js"></script>
</body>
</html>
